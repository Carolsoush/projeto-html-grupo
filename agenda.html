<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PetService - Agendamento de serviços para pets">
    <title>PetService — Agendamento</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="container">
            <h1>PetService</h1>
            <nav>
                <a href="index.html">Home</a>
            </nav>
            <p>Seu gerenciador de serviços para pets</p>

            <nav>
                <ul>
                    <li><a href="index.html">Login</a></li>
                    <li><a href="cadastro.html">Novo Cadastro</a></li>
                    <li><a href="agenda.html">Agendamento</a></li>
                    <li><a href="tabela.html">Tabela</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="container">
            <h2>Agendar Serviço</h2>

            <form>
                <fieldset>
                    <legend>Dados do Agendamento</legend>

                    <div class="form-group">
                        <label for="cliente">Seu nome:</label>
                        <input type="text" id="cliente" name="cliente" placeholder="Digite seu nome" required>
                    </div>

                    <div class="form-group">
                        <label for="pet">Nome do pet:</label>
                        <input type="text" id="pet" name="pet" placeholder="Nome do pet" required>
                    </div>

                    <div class="form-group">
                        <label for="servico">Tipo de serviço:</label>
                        <select id="servico" name="servico" required>
                            <option value="">Selecione</option>
                            <option value="banho_tosa">Banho e Tosa</option>
                            <option value="tosa_higienica">Tosa Higiênica</option>
                            <option value="tosa_completa">Tosa Completa</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="data">Data:</label>
                        <input type="date" id="data" name="data" required>
                    </div>

                    <div class="form-group">
                        <label for="hora">Horário:</label>
                        <input type="time" id="hora" name="hora" required>
                    </div>

                    <div class="form-group">
                        <button type="submit">Agendar</button>
                    </div>

                </fieldset>
            </form>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 PetService &mdash; Projeto Programador de Web</p>
            <p>Gerenciador de serviços para pets</p>
        </div>
    </footer>

</body>

</html>

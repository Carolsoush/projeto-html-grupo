<!DOCTYPE html>
<<html lang="pt-BR">

    <head>
        <meta charset="UTF-8">
        <title>Bem Vindo ao PetService</title>
    </head>

    <body>
        <h1>Pet Service</h1>
        <h2>Agendamento de Serviços para Petshop</h2>
        <form>
            <h2>Cadastro do Cliente e Pet</h2>

            <label for="nome">Nome do Tutor:</label><br>
            <input type="text" id="nome" name="nome" required><br><br>

            <label for="pet">Nome do Pet:</label><br>
            <input type="text" id="pet" name="pet" required><br><br>

            <label for="raca">Raça:</label><br>
            <input type="text" id="raca" name="raca"><br><br>

            <label for="servico">Serviço:</label><br>
            <select id="servico" name="servico">
                <option>Banho</option>
                <option>Tosa</option>
                <option>Vacina</option>
                <option>Consulta</option>
            </select><br><br>

            <label for="data">Data:</label><br>
            <input type="date" id="data" name="data" required><br><br>

            <label for="hora">Horário:</label><br>
            <input type="time" id="hora" name="hora" required><br><br>

            <button type="submit">Agendar</button>
        </form>

    </body>

    </html>
